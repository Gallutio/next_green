<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NextGreen - About Us</title>
  <link rel="stylesheet" href="style.css" />
  <style>

    .hero {
      background-color: var(--green-dark);
      color: white;
      text-align: center;
      padding: 60px 20px;
      border-bottom: 3px solid var(--yellow);
    }

    .hero img {
      height: 90px;
      margin: 0 auto 20px auto;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .hero h1 span {
      color: var(--yellow);
    }

    .hero p {
      color: #ccc;
      max-width: 600px;
      margin: 0 auto 20px auto;
     }

    .sdg-badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      border: 1px solid var(--yellow);
      color: var(--yellow);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
    }

    .section-title {
      font-size: 1.5rem;
      color: var(--green-dark);
      margin-bottom: 15px;
      border-left: 4px solid var(--yellow);
      padding-left: 12px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-top: 4px solid var(--yellow);
      border-radius: 8px;
      padding: 20px;
      flex: 1 1 200px;
    }

    .card .icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .card h3 {
      color: var(--green-dark);
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      color: #666;
      margin: 0;
    }

    .sdg-section {
      background-color: var(--green-dark);
      color: white;
      padding: 60px 0;
      text-align: center;
    }

    .sdg-section h2 {
      color: var(--yellow);
      margin-bottom: 10px;
    }

    .sdg-section .intro {
      color: #ccc;
      margin-bottom: 30px;
    }

    .sdg-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      justify-content: center;
    }

    .sdg-card {
      background-color: rgba(255, 255, 255, 0.08);
      border: 1px solid var(--yellow-dark);
      border-radius: 10px;
      padding: 25px 20px;
      flex: 1 1 220px;
      text-align: left;
    }

    .sdg-card .sdg-num {
      font-size: 36px;
      font-weight: bold;
      color: var(--yellow);
      margin-bottom: 5px;
    }

    .sdg-card h3 {
      color: white;
      margin-bottom: 8px;
    }

    .sdg-card p {
      font-size: 13px;
      color: #bbb;
      margin: 0;
    }

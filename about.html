<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NextGreen - About Us</title>
  <link rel="stylesheet" href="style.css" />
  <style>

    .hero {
      background-color: var(--green-dark);
      color: white;
      text-align: center;
      padding: 60px 20px;
      border-bottom: 3px solid var(--yellow);
    }

    .hero img {
      height: 90px;
      margin: 0 auto 20px auto;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .hero h1 span {
      color: var(--yellow);
    }

    .hero p {
      color: #ccc;
      max-width: 600px;
      margin: 0 auto 20px auto;
     }

    .sdg-badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      border: 1px solid var(--yellow);
      color: var(--yellow);
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 13px;
    }

    .section-title {
      font-size: 1.5rem;
      color: var(--green-dark);
      margin-bottom: 15px;
      border-left: 4px solid var(--yellow);
      padding-left: 12px;
    }

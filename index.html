<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css" />
    <style>

    .hero {
      background-color: var(--green-dark);
      color: white;
      text-align: center;
      padding: 60px 20px;
      border-bottom: 3px solid var(--yellow);
    }

    .hero img {
      height: 90px;
      margin: 0 auto 20px auto;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .hero h1 span {
      color: var(--yellow);
    }

    .hero p {
      color: #ccc;
      max-width: 600px;
      margin: 0 auto 20px auto;
     }


    .section-title {
      font-size: 1.5rem;
      color: var(--green-dark);
      margin-bottom: 15px;
      border-left: 4px solid var(--yellow);
      padding-left: 12px;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background-color: #f9f9f9;
      border: 1px solid #ddd;
      border-top: 4px solid var(--yellow);
      border-radius: 8px;
      padding: 20px;
      flex: 1 1 200px;
    }

    .card .icon {
      font-size: 28px;
      margin-bottom: 10px;
    }

    .card h3 {
      color: var(--green-dark);
      margin-bottom: 8px;
    }

    .card p {
      font-size: 14px;
      color: #666;
      margin: 0;
    }
    </style>
</head>

        <a class="navbar-brand" href="compare.html">Compare</a>
        <a class="navbar-brand" href="about.html">About Us</a>
    </nav>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Next Green AI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-header">
            <img src="assets/images/logo.png" alt="NextGreen logo" class="auth-icon">
            <h1>NextGreen</h1>
            <p>Log in to track your eco impact</p>
        </div>
        <form class="auth-form" id="loginForm">
            <div class="auth-field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="auth-field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Your password" required>
            </div>
            <div class="auth-error" id="errorMsg"></div>
            <button type="submit" class="auth-btn" id="submitBtn">Log In</button>
        </form>
        <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>
    <script src="js/auth.js"></script>
    <script>
        redirectIfLoggedIn();

        var form = document.getElementById("loginForm");
        var errorMsg = document.getElementById("errorMsg");
        var submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();
            errorMsg.textContent = "";
            submitBtn.disabled = true;
            submitBtn.textContent = "Logging in...";

            var email = document.getElementById("email").value.trim();
            var password = document.getElementById("password").value;

            try {
                var res = await fetch("/api/auth/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, password: password })
                });

                var data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Login failed");
                }

                saveAuth(data.token, data.user);
                window.location.href = "/dashboard.html";
            } catch (err) {
                errorMsg.textContent = err.message;
                submitBtn.disabled = false;
                submitBtn.textContent = "Log In";
            }
        });
    </script>
</body>
</html>

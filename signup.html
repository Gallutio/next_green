<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Next Green AI</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
    <div class="auth-wrapper">
        <div class="auth-header">
            <img src="assets/images/robot.png" alt="AI Robot" class="auth-icon">
            <h1>Next Green AI</h1>
            <p>Create an account to start tracking</p>
        </div>
        <form class="auth-form" id="signupForm">
            <div class="auth-field">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required>
            </div>
            <div class="auth-field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="At least 6 characters" minlength="6" required>
            </div>
            <div class="auth-field">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" minlength="6" required>
            </div>
            <div class="auth-error" id="errorMsg"></div>
            <button type="submit" class="auth-btn" id="submitBtn">Sign Up</button>
        </form>
        <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    </div>
    <script src="js/auth.js"></script>
    <script>
        redirectIfLoggedIn();

        var form = document.getElementById("signupForm");
        var errorMsg = document.getElementById("errorMsg");
        var submitBtn = document.getElementById("submitBtn");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();
            errorMsg.textContent = "";

            var email = document.getElementById("email").value.trim();
            var password = document.getElementById("password").value;
            var confirmPassword = document.getElementById("confirmPassword").value;

            if (password !== confirmPassword) {
                errorMsg.textContent = "Passwords do not match.";
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = "Creating account...";

            try {
                var res = await fetch("/api/auth/signup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, password: password })
                });

                var data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error || "Sign up failed");
                }

                if (data.confirmEmail) {
                    errorMsg.style.color = "var(--green)";
                    errorMsg.textContent = "Check your email to confirm your account, then log in.";
                    submitBtn.textContent = "Email sent!";
                } else {
                    saveAuth(data.token, data.user);
                    window.location.href = "/dashboard.html";
                }
            } catch (err) {
                errorMsg.textContent = err.message;
                submitBtn.disabled = false;
                submitBtn.textContent = "Sign Up";
            }
        });
    </script>
</body>
</html>
